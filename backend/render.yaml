# ============================================================
# render.yaml — Render deployment config for KeyMart Global
# Backend (FastAPI) service definition
#
# NOTE: Selenium/Chromium is NO LONGER installed on Render.
# WhatsApp automation runs on client machines via Docker Agent.
# ============================================================

services:
  - type: web
    name: keymart-global-backend
    runtime: python
    rootDir: backend              # ← points Render to the backend/ subfolder
    buildCommand: bash build.sh
    startCommand: gunicorn main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    plan: free

    # ── Environment Variables ─────────────────────────────────
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

      - key: GOOGLE_SHEET_ID
        sync: false

      - key: GOOGLE_TYPE
        value: service_account

      - key: GOOGLE_PROJECT_ID
        sync: false

      - key: GOOGLE_PRIVATE_KEY_ID
        sync: false

      - key: GOOGLE_PRIVATE_KEY
        sync: false

      - key: GOOGLE_CLIENT_EMAIL
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_TOKEN_URI
        value: https://oauth2.googleapis.com/token

      - key: WHATSAPP_API_TOKEN
        sync: false

      - key: WHATSAPP_PHONE_ID
        sync: false

      - key: ADMIN_WHATSAPP_NUMBER
        sync: false

      # Your Vercel frontend URL — used for CORS whitelisting
      - key: FRONTEND_URL
        sync: false
