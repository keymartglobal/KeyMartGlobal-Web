# ============================================================
# render.yaml — Render deployment config for KeyMart Global
# Backend (FastAPI) service definition
# ============================================================

services:
  - type: web
    name: keymart-global-backend
    runtime: python
    rootDir: backend              # ← points Render to the backend/ subfolder
    buildCommand: |
      apt-get update && apt-get install -y wget gnupg unzip curl && \
      wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | apt-key add - && \
      echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list && \
      apt-get update && apt-get install -y google-chrome-stable && \
      pip install -r requirements.txt
    startCommand: gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    plan: free                    # Change to "starter" for production

    # ── Environment Variables ─────────────────────────────────
    # Set these in the Render dashboard under Environment tab.
    # DO NOT hardcode secrets here.
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

      - key: GOOGLE_SHEET_ID
        sync: false               # Set manually in Render dashboard

      - key: GOOGLE_TYPE
        value: service_account

      - key: GOOGLE_PROJECT_ID
        sync: false

      - key: GOOGLE_PRIVATE_KEY_ID
        sync: false

      - key: GOOGLE_PRIVATE_KEY
        sync: false               # Paste the full key in Render dashboard

      - key: GOOGLE_CLIENT_EMAIL
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_TOKEN_URI
        value: https://oauth2.googleapis.com/token

      - key: WHATSAPP_API_TOKEN
        sync: false

      - key: WHATSAPP_PHONE_ID
        sync: false

      - key: ADMIN_WHATSAPP_NUMBER
        sync: false

      # Your Vercel frontend URL — used for CORS whitelisting
      # Example: https://keymart-global.vercel.app
      - key: FRONTEND_URL
        sync: false
